name: Build Changed CUDA Projects

on:
  workflow_dispatch:
  push:
    paths:
      - "cuda_projects/**"
      - ".github/workflows/build-changed-cuda-projects.yml"

permissions:
  contents: read

jobs:
  detect-projects:
    name: Detect changed CUDA projects
    runs-on: ubuntu-latest

    outputs:
      projects: ${{ steps.detect.outputs.projects }}
      has_projects: ${{ steps.detect.outputs.has_projects }}

    steps:
      - name: Checkout repository history
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect changed project folders
        id: detect
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          ROOT="cuda_projects"
          WORKFLOW_FILE=".github/workflows/build-changed-cuda-projects.yml"
          PROJECT_LIST="$(mktemp)"
          CHANGED_LIST="$(mktemp)"

          cleanup() {
            rm -f "$PROJECT_LIST" "$CHANGED_LIST"
          }
          trap cleanup EXIT

          list_all_projects() {
            if [[ ! -d "$ROOT" ]]; then
              return 0
            fi

            find "$ROOT" \
              -mindepth 1 \
              -maxdepth 1 \
              -type d \
              -print |
            while IFS= read -r project_dir; do
              if compgen -G "$project_dir/*.cu" > /dev/null; then
                basename "$project_dir"
              fi
            done
          }

          add_changed_projects() {
            while IFS= read -r changed_file; do
              [[ -z "$changed_file" ]] && continue

              case "$changed_file" in
                cuda_projects/*/*)
                  project_name="${changed_file#cuda_projects/}"
                  project_name="${project_name%%/*}"
                  project_dir="$ROOT/$project_name"

                  if [[ -d "$project_dir" ]] &&
                     compgen -G "$project_dir/*.cu" > /dev/null; then
                    printf '%s\n' "$project_name"
                  fi
                  ;;
              esac
            done < "$CHANGED_LIST"
          }

          build_all=false

          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            echo "Manual run: build all CUDA projects."
            build_all=true
          elif [[ -z "${BEFORE_SHA:-}" ]] ||
               [[ "$BEFORE_SHA" =~ ^0+$ ]]; then
            echo "No usable previous SHA: build all CUDA projects."
            build_all=true
          elif ! git cat-file -e "${BEFORE_SHA}^{commit}" 2>/dev/null; then
            echo "Previous commit is unavailable: build all CUDA projects."
            build_all=true
          else
            git diff \
              --name-only \
              "$BEFORE_SHA" \
              "$CURRENT_SHA" > "$CHANGED_LIST"

            echo "Changed files:"
            sed 's/^/ - /' "$CHANGED_LIST"

            if grep -Fxq "$WORKFLOW_FILE" "$CHANGED_LIST"; then
              echo "Workflow changed: build all CUDA projects."
              build_all=true
            fi
          fi

          if [[ "$build_all" == "true" ]]; then
            list_all_projects > "$PROJECT_LIST"
          else
            add_changed_projects > "$PROJECT_LIST"
          fi

          sort -u "$PROJECT_LIST" -o "$PROJECT_LIST"

          projects_json="$(
            jq \
              -R \
              -s \
              -c \
              'split("\n") | map(select(length > 0))' \
              < "$PROJECT_LIST"
          )"

          if [[ "$projects_json" == "[]" ]]; then
            has_projects=false
          else
            has_projects=true
          fi

          echo "Selected projects: $projects_json"
          echo "projects=$projects_json" >> "$GITHUB_OUTPUT"
          echo "has_projects=$has_projects" >> "$GITHUB_OUTPUT"

  build-project:
    name: Build ${{ matrix.project }}
    needs: detect-projects
    if: needs.detect-projects.outputs.has_projects == 'true'

    strategy:
      fail-fast: false
      matrix:
        project: ${{ fromJSON(needs.detect-projects.outputs.projects) }}

    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.35
        with:
          cuda: "12.6.3"
          method: "network"
          sub-packages: '["nvcc", "cudart"]'

      - name: Compile changed project into DLL
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"

          setlocal EnableDelayedExpansion

          set "PROJECT_NAME=${{ matrix.project }}"
          set "PROJECT_DIR=cuda_projects\${{ matrix.project }}"
          set "BUILD_DIR=build\${{ matrix.project }}"
          set "DLL_PATH=build\${{ matrix.project }}\${{ matrix.project }}.dll"

          if not exist "!PROJECT_DIR!" (
            echo Missing project folder: !PROJECT_DIR!
            exit /b 1
          )

          if not exist "!PROJECT_DIR!\*.cu" (
            echo No .cu file found in: !PROJECT_DIR!
            exit /b 1
          )

          if not exist "!BUILD_DIR!" mkdir "!BUILD_DIR!"

          set "CU_FILES="
          for %%F in ("!PROJECT_DIR!\*.cu") do (
            set CU_FILES=!CU_FILES! "%%~fF"
          )

          echo Building project: !PROJECT_NAME!
          echo CUDA sources: !CU_FILES!

          nvcc --version

          nvcc ^
            -std=c++17 ^
            -O2 ^
            --shared ^
            --cudart static ^
            -arch=sm_86 ^
            -Xcompiler "/MD /EHsc" ^
            -DCUDA_DLL_EXPORTS ^
            -I"!PROJECT_DIR!" ^
            !CU_FILES! ^
            -o "!DLL_PATH!"

          if errorlevel 1 exit /b !errorlevel!

          dir "!BUILD_DIR!"

      - name: Verify DLL exports
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          dumpbin /exports "build\${{ matrix.project }}\${{ matrix.project }}.dll"

      - name: Package DLL and project files
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $project = "${{ matrix.project }}"
          $projectPath = Join-Path "cuda_projects" $project
          $buildPath = Join-Path "build" $project
          $packagePath = Join-Path "package" $project

          New-Item -ItemType Directory -Force -Path $packagePath |
            Out-Null

          Copy-Item `
            (Join-Path $buildPath "$project.dll") `
            $packagePath

          foreach ($extension in @(".lib", ".exp")) {
            $compiledFile = Join-Path $buildPath "$project$extension"

            if (Test-Path $compiledFile) {
              Copy-Item $compiledFile $packagePath
            }
          }

          Get-ChildItem -Path $projectPath -File |
            Where-Object {
              $_.Extension -in @(".h", ".hpp", ".py")
            } |
            Copy-Item -Destination $packagePath

          Get-ChildItem -Path $packagePath |
            ForEach-Object {
              Write-Host "Packaged: $($_.Name)"
            }

      - name: Upload project artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.project }}-windows-x64-sm86
          path: package/${{ matrix.project }}/
          retention-days: 14
          if-no-files-found: error
