name: Build Changed CUDA Projects

on:
  workflow_dispatch:
  push:
    paths:
      - "cuda_projects/**"
      - ".github/workflows/build-changed-cuda-projects.yml"

permissions:
  contents: read

jobs:
  detect-projects:
    name: Detect changed CUDA projects
    runs-on: ubuntu-latest

    outputs:
      projects: ${{ steps.detect.outputs.projects }}
      has_projects: ${{ steps.detect.outputs.has_projects }}

    steps:
      - name: Checkout repository history
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect changed project folders
        id: detect
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          ROOT="cuda_projects"
          WORKFLOW_FILE=".github/workflows/build-changed-cuda-projects.yml"
          PROJECT_LIST="$(mktemp)"
          CHANGED_LIST="$(mktemp)"

          cleanup() {
            rm -f "$PROJECT_LIST" "$CHANGED_LIST"
          }
          trap cleanup EXIT

          project_has_cuda() {
            local project_dir="$1"
            [[ -n "$(find "$project_dir" -maxdepth 3 -type f -name '*.cu' -print -quit 2>/dev/null)" ]]
          }

          list_all_projects() {
            if [[ ! -d "$ROOT" ]]; then
              return 0
            fi

            find "$ROOT" \
              -mindepth 1 \
              -maxdepth 1 \
              -type d \
              -print |
            while IFS= read -r project_dir; do
              if project_has_cuda "$project_dir"; then
                basename "$project_dir"
              fi
            done
          }

          add_changed_projects() {
            while IFS= read -r changed_file; do
              [[ -z "$changed_file" ]] && continue

              case "$changed_file" in
                cuda_projects/*/*)
                  project_name="${changed_file#cuda_projects/}"
                  project_name="${project_name%%/*}"
                  project_dir="$ROOT/$project_name"

                  if [[ -d "$project_dir" ]] && project_has_cuda "$project_dir"; then
                    printf '%s\n' "$project_name"
                  fi
                  ;;
              esac
            done < "$CHANGED_LIST"
          }

          build_all=false

          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            echo "Manual run: build all CUDA projects."
            build_all=true
          elif [[ -z "${BEFORE_SHA:-}" ]] || [[ "$BEFORE_SHA" =~ ^0+$ ]]; then
            echo "No usable previous SHA: build all CUDA projects."
            build_all=true
          elif ! git cat-file -e "${BEFORE_SHA}^{commit}" 2>/dev/null; then
            echo "Previous commit is unavailable: build all CUDA projects."
            build_all=true
          else
            git diff --name-only "$BEFORE_SHA" "$CURRENT_SHA" > "$CHANGED_LIST"

            echo "Changed files:"
            sed 's/^/ - /' "$CHANGED_LIST"

            if grep -Fxq "$WORKFLOW_FILE" "$CHANGED_LIST"; then
              echo "Workflow changed: build all CUDA projects."
              build_all=true
            fi
          fi

          if [[ "$build_all" == "true" ]]; then
            list_all_projects > "$PROJECT_LIST"
          else
            add_changed_projects > "$PROJECT_LIST"
          fi

          sort -u "$PROJECT_LIST" -o "$PROJECT_LIST"

          projects_json="$(
            jq -R -s -c \
              'split("\n") | map(select(length > 0))' \
              < "$PROJECT_LIST"
          )"

          if [[ "$projects_json" == "[]" ]]; then
            has_projects=false
          else
            has_projects=true
          fi

          echo "Selected projects: $projects_json"
          echo "projects=$projects_json" >> "$GITHUB_OUTPUT"
          echo "has_projects=$has_projects" >> "$GITHUB_OUTPUT"

  build-project:
    name: Build ${{ matrix.project }}
    needs: detect-projects
    if: needs.detect-projects.outputs.has_projects == 'true'

    strategy:
      fail-fast: false
      matrix:
        project: ${{ fromJSON(needs.detect-projects.outputs.projects) }}

    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.35
        with:
          cuda: "12.6.3"
          method: "network"
          sub-packages: '["nvcc", "cudart"]'

      - name: Compile DLL and test executable
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $vsDevCmd = "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\Common7\Tools\VsDevCmd.bat"
          if (-not (Test-Path $vsDevCmd)) {
            throw "Visual Studio developer command file not found: $vsDevCmd"
          }

          cmd /c "call `"$vsDevCmd`" -arch=amd64 -host_arch=amd64 >nul && set" |
            ForEach-Object {
              if ($_ -match '^([^=]+)=(.*)$') {
                Set-Item -Path "Env:$($matches[1])" -Value $matches[2]
              }
            }

          $project = "${{ matrix.project }}"
          $projectPath = Join-Path "cuda_projects" $project
          $buildPath = Join-Path "build" $project
          $configPath = Join-Path $projectPath "cuda_project.json"
          $dllPath = Join-Path $buildPath "$project.dll"
          $libPath = Join-Path $buildPath "$project.lib"

          if (-not (Test-Path $projectPath)) {
            throw "Missing project folder: $projectPath"
          }

          New-Item -ItemType Directory -Force -Path $buildPath | Out-Null

          $dllSourceNames = @()
          $testSourceNames = @()
          $includeNames = @(".")
          $testExecutable = "test_$project.exe"
          $packageFiles = @()

          if (Test-Path $configPath) {
            $config = Get-Content $configPath -Raw | ConvertFrom-Json
            $dllSourceNames = @($config.dll_sources)
            $testSourceNames = @($config.test_sources)
            $includeNames += @($config.include_dirs)
            if ($config.test_executable) {
              $testExecutable = [string]$config.test_executable
            }
            $packageFiles = @($config.package_files)
          }
          else {
            $primarySource = Join-Path $projectPath "$project.cu"
            if (Test-Path $primarySource) {
              $dllSourceNames = @("$project.cu")
            }
            else {
              $dllSourceNames = @(
                Get-ChildItem -Path $projectPath -File -Filter "*.cu" |
                  Where-Object { $_.Name -notmatch '^(test|benchmark)[_-]' } |
                  ForEach-Object { $_.Name }
              )
            }
            $testSourceNames = @(
              Get-ChildItem -Path $projectPath -File -Filter "*.cu" |
                Where-Object { $_.Name -match '^(test|benchmark)[_-]' } |
                ForEach-Object { $_.Name }
            )
            if (Test-Path (Join-Path $projectPath "include")) {
              $includeNames += "include"
            }
          }

          if ($dllSourceNames.Count -eq 0) {
            throw "No DLL CUDA sources selected for $project"
          }

          $dllSources = @(
            $dllSourceNames | ForEach-Object {
              $path = Join-Path $projectPath $_
              if (-not (Test-Path $path)) {
                throw "Configured DLL source not found: $path"
              }
              (Resolve-Path $path).Path
            }
          )

          $testSources = @(
            $testSourceNames | ForEach-Object {
              $path = Join-Path $projectPath $_
              if (-not (Test-Path $path)) {
                throw "Configured test source not found: $path"
              }
              (Resolve-Path $path).Path
            }
          )

          $includeArgs = @(
            $includeNames |
              Where-Object { $_ } |
              Select-Object -Unique |
              ForEach-Object {
                $path = Join-Path $projectPath $_
                if (-not (Test-Path $path)) {
                  throw "Configured include directory not found: $path"
                }
                "-I$((Resolve-Path $path).Path)"
              }
          )

          $commonArgs = @(
            "-std=c++17",
            "-O2",
            "--cudart", "static",
            "-arch=sm_86",
            "-Xcompiler=/MD,/EHsc"
          ) + $includeArgs

          Write-Host "Project: $project"
          Write-Host "DLL sources: $($dllSources -join ', ')"
          Write-Host "Test sources: $($testSources -join ', ')"
          Write-Host "Include args: $($includeArgs -join ', ')"
          nvcc --version

          & nvcc @commonArgs "-DCUDA_DLL_EXPORTS" --shared @dllSources -o $dllPath
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          if (-not (Test-Path $dllPath)) {
            throw "DLL was not generated: $dllPath"
          }
          if (-not (Test-Path $libPath)) {
            throw "Import library was not generated: $libPath"
          }

          if ($testSources.Count -gt 0) {
            $testPath = Join-Path $buildPath $testExecutable
            & nvcc @commonArgs @testSources $libPath -o $testPath
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            if (-not (Test-Path $testPath)) {
              throw "Test executable was not generated: $testPath"
            }
          }

          Get-ChildItem -Path $buildPath |
            ForEach-Object { Write-Host "Built: $($_.FullName)" }

      - name: Verify DLL exports
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $vsDevCmd = "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\Common7\Tools\VsDevCmd.bat"
          cmd /c "call `"$vsDevCmd`" -arch=amd64 -host_arch=amd64 >nul && set" |
            ForEach-Object {
              if ($_ -match '^([^=]+)=(.*)$') {
                Set-Item -Path "Env:$($matches[1])" -Value $matches[2]
              }
            }

          $project = "${{ matrix.project }}"
          $dllPath = Join-Path (Join-Path "build" $project) "$project.dll"
          dumpbin /exports $dllPath
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Package DLL, tests and public files
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $project = "${{ matrix.project }}"
          $projectPath = Join-Path "cuda_projects" $project
          $buildPath = Join-Path "build" $project
          $packagePath = Join-Path "package" $project
          $configPath = Join-Path $projectPath "cuda_project.json"

          New-Item -ItemType Directory -Force -Path $packagePath | Out-Null

          Get-ChildItem -Path $buildPath -File |
            Where-Object { $_.Extension -in @(".dll", ".lib", ".exp", ".exe") } |
            Copy-Item -Destination $packagePath

          $includePath = Join-Path $projectPath "include"
          if (Test-Path $includePath) {
            Copy-Item $includePath (Join-Path $packagePath "include") -Recurse
          }

          $packageFiles = @()
          if (Test-Path $configPath) {
            $config = Get-Content $configPath -Raw | ConvertFrom-Json
            $packageFiles = @($config.package_files)
          }

          if ($packageFiles.Count -gt 0) {
            foreach ($relativePath in $packageFiles) {
              $source = Join-Path $projectPath $relativePath
              if (-not (Test-Path $source)) {
                throw "Configured package file not found: $source"
              }
              Copy-Item $source $packagePath -Recurse -Force
            }
          }
          else {
            Get-ChildItem -Path $projectPath -File |
              Where-Object {
                $_.Extension -in @(".h", ".hpp", ".cuh", ".py", ".md", ".json", ".txt", ".ps1")
              } |
              Copy-Item -Destination $packagePath
          }

          Get-ChildItem -Path $packagePath -Recurse |
            ForEach-Object { Write-Host "Packaged: $($_.FullName)" }

      - name: Upload project artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.project }}-windows-x64-sm86
          path: package/${{ matrix.project }}/
          retention-days: 14
          if-no-files-found: error
