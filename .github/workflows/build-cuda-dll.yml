name: Build CUDA DLL

on:
  workflow_dispatch:
  push:
    paths:
      - "src/**"
      - "include/**"
      - ".github/workflows/build-cuda-dll.yml"

permissions:
  contents: read

jobs:
  build-windows-dll:
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.35
        with:
          cuda: "12.6.3"
          method: "network"
          sub-packages: '["nvcc", "cudart"]'

      - name: Compile .cu into .dll
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          if not exist build mkdir build
          nvcc --version
          nvcc ^
            -std=c++17 ^
            -O2 ^
            --shared ^
            --cudart static ^
            -arch=sm_86 ^
            -Xcompiler "/MD /EHsc" ^
            -DCUDA_DLL_EXPORTS ^
            -Iinclude ^
            src\cuda_vector_add.cu ^
            -o build\cuda_vector_add.dll

      - name: Verify exported DLL functions
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          dumpbin /exports build\cuda_vector_add.dll
          dir build

      - name: Package files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path package | Out-Null
          Copy-Item build\cuda_vector_add.dll package\
          if (Test-Path build\cuda_vector_add.lib) {
            Copy-Item build\cuda_vector_add.lib package\
          }
          if (Test-Path build\cuda_vector_add.exp) {
            Copy-Item build\cuda_vector_add.exp package\
          }
          Copy-Item include\cuda_vector_add.h package\
          Copy-Item python\test_cuda_dll.py package\

      - name: Upload compiled DLL
        uses: actions/upload-artifact@v4
        with:
          name: cuda-vector-add-windows-x64-sm86
          path: package/
          retention-days: 14
          if-no-files-found: error
